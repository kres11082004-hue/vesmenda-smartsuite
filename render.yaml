services:
  # Backend Web Service
  - type: web
    name: vesmenda-smartsuite-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vesmenda-db
          property: connectionString
      - key: NODE_VERSION
        value: 20
      - key: CI
        value: false
