services:
  # Backend Web Service
  - type: web
    name: vesmenda-smartsuite-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vesmenda-db
          property: connectionString
      - key: NODE_VERSION
        value: 20
      - key: CI
        value: false

  # Frontend Static Site
  - type: static
    name: vesmenda-smartsuite
    env: static
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vesmenda-smartsuite-api
          property: host
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
